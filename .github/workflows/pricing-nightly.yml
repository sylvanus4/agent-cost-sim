name: Nightly pricing refresh

on:
  schedule:
    - cron: "0 2 * * *" # 02:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrape public pricing
        run: python3 scripts/scrape_pricing.py

      - name: Validate schema (blocks bad data)
        run: python3 scripts/validate_pricing.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- data/pricing.json; then
            echo "no pricing change"
            exit 0
          fi
          git config user.name "pricing-bot"
          git config user.email "pricing-bot@users.noreply.github.com"
          git add data/pricing.json
          git commit -m "chore: nightly pricing refresh"
          git push
